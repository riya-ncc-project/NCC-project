<!DOCTYPE html>
<html lang="en">
<head>
    <title>Cadet Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px; background-color: #f8f9fa; }
        .dashboard-container { background: white; padding: 30px; border-radius: 10px; shadow: 0 4px 8px rgba(0,0,0,0.1); }
        /* Search box ko table ke upar align karne ke liye */
        #searchInput { max-width: 400px; margin-bottom: 20px; border: 2px solid #198754; }
    </style>
</head>
<body>
    <div class="container dashboard-container">
        <h2 class="mb-4">Registered Cadets List</h2>

        <input type="text" id="searchInput" class="form-control" placeholder="Search by Name or Enrollment Number...">

        <table class="table table-bordered table-striped">
            <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Enrollment</th>
                    <th>College</th>
                    <th>Wing</th>
                    <th>Phone</th>
                 <th>Status</th>
                <th>Action</th> 
            </thead>
            <tbody id="cadetTableBody">
                
                </tbody>
        </table>
    </div>
    <button class="btn btn-warning" onclick="logout()">Logout</button>

    <script>

        // Dashboard ke script tag mein sabse pehle ye likhein
if (localStorage.getItem('isLoggedIn') !== 'true') {
    alert("Kripya pehle login karein!");
    window.location.href = 'login.html'; 
}

        // Data load karne ka function
        function loadData(searchTerm = '') {
    fetch(`http://localhost:5000/cadets?search=${searchTerm}`)
        .then(res => res.json())
        .then(data => {
            const tbody = document.getElementById('cadetTableBody');
            tbody.innerHTML = ''; 

            data.forEach(cadet => {
                // Status ke hisaab se color logic
                let statusColor = cadet.status === 'Approved' ? 'text-success' : 'text-warning';

                // Yahan dhyan dein: Total 7 <td> hone chahiye
                tbody.innerHTML += `
                    <tr>
                        <td>${cadet.full_name}</td>
                        <td>${cadet.enrollment_no}</td>
                        <td>${cadet.college_name}</td>
                        <td>${cadet.wing}</td>
                        <td>${cadet.phone}</td>
                        <td class="fw-bold ${statusColor}">${cadet.status || 'Pending'}</td>
                        <td>
                            <button class="btn btn-success btn-sm" onclick="updateStatus(${cadet.id}, 'Approved')">Approve</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteCadet(${cadet.id})">Delete</button>
                        </td>
                    </tr>`;
            });
        });
}
        // Search Filter Logic
        document.getElementById('searchInput').addEventListener('keyup', function() {
            let filter = this.value.toLowerCase();
            let rows = document.querySelectorAll('#cadetTableBody tr');
            
            rows.forEach(row => {
                let text = row.innerText.toLowerCase();
                row.style.display = text.includes(filter) ? '' : 'none';
            });
        });

        // Delete Logic
        function deleteCadet(id) {
    if(confirm("Are you sure you want to delete this cadet?")) {
        fetch(`http://localhost:5000/delete-cadet/${id}`, { 
            method: 'DELETE' 
        })
        .then(res => {
            if (res.ok) {
                alert("Cadet deleted successfully!");
                location.reload(); // Page refresh karke deleted row hatane ke liye
            } else {
                alert("Server error: Delete nahi ho paya.");
            }
        })
        .catch(err => console.log("Fetch Error:", err));
    }
}

function logout() {
    localStorage.removeItem('isLoggedIn');
    window.location.href = 'login.html';
}

        loadData(); // Page load hote hi data dikhao

        function updateStatus(id, newStatus) {
    fetch(`http://localhost:5000/update-status/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: newStatus })
    })
    .then(res => res.text())
    .then(msg => {
        alert(msg);
        loadData(); // Table ko refresh karein
    })
    .catch(err => console.error("Error updating status:", err));
}
    </script>
</body>
</html>

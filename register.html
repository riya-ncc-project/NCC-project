<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cadet Registration</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { 
            background-color: #f8f9fa; 
        }
        .registration-card { 
            border-top: 5px solid #198754; 
            border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            background-color: #ffffff;
            padding: 30px;
            margin-top: 50px;
        }
    </style>
</head>

<div class="modal fade" id="previewModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Confirm Your Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="pdfContent">
                </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-success" onclick="downloadNow()">Download PDF</button>
            </div>
        </div>
    </div>
</div>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow registration-card">
                    <div class="card-body p-5">
                        <h2 class="text-center mb-4">Cadet Registration</h2>
                        <form id="cadetForm">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Full Name</label>
                                    <input type="text" class="form-control" id="fullName" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Enrollment Number</label>
                                    <input type="text" class="form-control" id="enrollNo" required>
                                </div>
                                <div class="col-12">
                                    <label class="form-label">College Name</label>
                                    <input type="text" class="form-control" id="collegeName" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Year of Study</label>
                                    <select class="form-select" id="year" required>
                                        <option value="1">1st Year</option>
                                        <option value="2">2nd Year</option>
                                        <option value="3">3rd Year</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Gender</label><br>
                                    <input type="radio" name="gender" value="Male" required> Male
                                    <input type="radio" name="gender" value="Female"> Female
                                </div>
                                <div class="col-md-6">
                                                 <label class="form-label">NCC Wing</label>
                                                 <select class="form-select" id="nccWing" required>
                                             <option value="Army">Army Wing</option>
                                            <option value="Navy">Navy Wing</option>
                                        <option value="Air Force">Air Force Wing</option>
                                        </select>
                                              </div>
                                <div class="col-md-6">
                                    <label class="form-label">Certificate Level</label>
                                           <select class="form-select" id="certLevel" required>
                                               <option value="A">A Certificate</option>
                                               <option value="B">B Certificate</option>
                                               <option value="C">C Certificate</option>
                                                     </select>
                                                   </div>
                                <div class="col-md-6">
                                    <label class="form-label">Phone</label>
                                    <input type="tel" class="form-control" id="phone" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-control" id="email" required>
                                </div>
                                <button type="submit" class="btn btn-success w-100 mt-4">Register Cadet</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
     let currentCadetData = null; // Data ko save rakhne ke liye variable

document.getElementById('cadetForm').addEventListener('submit', function (e) {
    e.preventDefault();
    
    currentCadetData = {
        fullName: document.getElementById('fullName').value,
        enrollmentNumber: document.getElementById('enrollNo').value,
        collegeName: document.getElementById('collegeName').value,
        year: document.getElementById('year').value,
        gender: document.querySelector('input[name="gender"]:checked').value,
        wing: document.getElementById('nccWing').value,
        certLevel: document.getElementById('certLevel').value,
        phone: document.getElementById('phone').value,
        email: document.getElementById('email').value
    };

    fetch('http://localhost:5000/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(currentCadetData)
    })
    .then(res => res.text())
    .then(data => {
        // 1. Details ko Modal mein dikhao
        const content = `
            <div style="padding: 20px; border: 2px solid #198754;">
                <h3 class="text-center">NCC Registration Details</h3>
                <hr>
                <p><strong>Name:</strong> ${currentCadetData.fullName}</p>
                <p><strong>Enrollment:</strong> ${currentCadetData.enrollmentNumber}</p>
                <p><strong>College:</strong> ${currentCadetData.collegeName}</p>
                <p><strong>Wing:</strong> ${currentCadetData.wing}</p>
                <p><strong>Phone:</strong> ${currentCadetData.phone}</p>
            </div>`;
        document.getElementById('pdfContent').innerHTML = content;

        // 2. Modal ko screen par dikhao
        var myModal = new bootstrap.Modal(document.getElementById('previewModal'));
        myModal.show();
    });
});

// Download button click hone par ye chalega
function downloadNow() {
    const element = document.getElementById('pdfContent');
    const opt = {
        margin: 1,
        filename: `NCC_Form_${currentCadetData.enrollmentNumber}.pdf`,
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
    };
    html2pdf().set(opt).from(element).save();
}
    </script>
</body>
</html>

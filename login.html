<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | NCC System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1590133325985-2c64ec7ffbb7?q=80&w=1500');
            background-size: cover;
            height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card {
            border-radius: 15px;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .login-header {
            background-color: var(--ncc-green);
            color: white;
            border-radius: 15px 15px 0 0;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card login-card">
                <div class="login-header text-center">
                    <h4>ADMIN PORTAL</h4>
                    <p class="mb-0">NCC Management System</p>
                </div>
                <div class="card-body p-4">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" id="username" class="form-control" placeholder="Enter Admin Username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" id="password" class="form-control" placeholder="Enter Password" required>
                        </div>
                        <div id="errorMsg" class="text-danger small mb-3" style="display:none;">
                            Invalid Username or Password!
                        </div>
                        <button type="submit" class="btn btn-ncc w-100">Login to Dashboard</button>
                    </form>
                </div>
            </div>
            <div class="text-center mt-3">
                <a href="index.html" class="text-white text-decoration-none small">← Back to Home</a>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;

    if(user === 'admin' && pass === 'admin123') {
        // Yeh line sabse zaroori hai
        localStorage.setItem('isLoggedIn', 'true'); 
        alert("Login Successful!");
        window.location.href = 'dashboard.html';
    } else {
        alert("Invalid Username or Password!");
    }
});
</script>

</body>
</html>
